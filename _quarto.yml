project:
  type: website
  output-dir: docs

website:
  title: "Paleogenomics and Evolutionary Biology"
  
  # Rastreo de Google Analystics
  google-analytics: "G-VNDXQWFF04"
  back-to-top-navigation: true #boton Back to the top
  favicon: img/Mammoth_DNnoback.png
  
  site-url: "https://liigh.unam.mx/newpage/edit_articles.php?n=3"
  repo-url: "https://github.com/PopGenEvoLab"
  navbar:
    title: false
    logo: img/Mammoth_DNnoback.png
    # background: "#F6F5F3"
    logo-alt: "Sánchez Research Group"

    left:
      - href: index.qmd
        text: Home
      - text: "People"         
        href: people/index.qmd 
      - href: research/index.qmd
      - href: publications/index.qmd 
      - text: "Events" 
        href: 4_events.qmd
      - text: "Science communication" 
        href: 5_videos.qmd
      - text: "News"
        href: 5_news.qmd
    right:    
      - text: "Contact"
        href: 6_contact.qmd    
      - icon: github
        href: https://github.com/PopGenEvoLab/PopGenEvoLab.github.io

  # Parte inferior de la pagina web
  page-footer: 
    border: false
    left: "Published with [Quarto](https://quarto.org/docs/websites) v1.3.450, by [Evelia Coss](https://eveliacoss.github.io/). License: [CC BY-SA 2.0](https://creativecommons.org/licenses/by-sa/2.0/)."
    right: 
      - icon: github
        href: https://github.com/PopGenEvoLab

format:
  html:
    theme:
      - sandstone
    css: styles.css
    toc: true
    include-in-header: 
      - text: |
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    include-after-body: 
      - text: |
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

filters:
  - reveal-logo # install quarto add royfrancis/quarto-reveal-logo
  - lightbox # install quarto add quarto-ext/lightbox
  - fontawesome # install quarto add quarto-ext/fontawesome

execute:
  eval: true
  echo: true
  warning: false
  message: false
  freeze: false

schedule_message:
colors:
  primary: "#95b540"
  secondary: "#BDD775"
  tertiary: "#E9F2D1"
  
editor: visual

